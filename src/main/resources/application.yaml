spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/lab_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      schema-locations: classpath:schema.sql
      mode: always
  h2:
    console:
      enabled: false
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

server:
  port: 8082

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl